
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  
  .cute-preview {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #fff0f5 0%, #ffe4f0 50%, #ffd6e8 100%);
    min-height: 480px;
    border-radius: 20px;
    padding: 0;
    overflow: hidden;
    border: 2px solid #ffb3d1;
    position: relative;
  }

  .deco {
    position: absolute;
    font-size: 22px;
    opacity: 0.55;
    pointer-events: none;
    user-select: none;
  }

  .cute-header {
    background: linear-gradient(135deg, #ff85b3, #ff6fa3, #e85d98);
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 3px dashed #ffb3d1;
  }

  .bear-icon {
    width: 40px;
    height: 40px;
    background: #fff0f5;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 2px 8px rgba(255,100,160,0.3);
    flex-shrink: 0;
  }

  .site-title {
    color: #fff;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.3px;
    text-shadow: 0 1px 3px rgba(180,40,100,0.3);
  }

  .site-sub {
    color: #ffd6ea;
    font-size: 12px;
    font-weight: 600;
    margin-top: 1px;
  }

  .candy-strip {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 8px 0 6px;
    background: #fff0f5;
    border-bottom: 1.5px solid #ffcce0;
  }

  .candy-pill {
    background: linear-gradient(135deg, #ffb3d1, #ff85b3);
    color: #7a0038;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .main-area {
    padding: 24px 28px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .section-label {
    font-size: 13px;
    font-weight: 700;
    color: #c0337a;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .clipboard-card {
    background: #fff;
    border: 2px solid #ffb3d1;
    border-radius: 18px;
    padding: 20px 22px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 20px rgba(255,130,180,0.15);
    position: relative;
  }

  .clipboard-card::before {
    content: '';
    position: absolute;
    top: -2px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 10px;
    background: #ffb3d1;
    border-radius: 0 0 10px 10px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .cute-input {
    flex: 1;
    border: 2px solid #ffcce0;
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #7a0038;
    background: #fff8fb;
    outline: none;
    transition: border-color 0.2s;
  }

  .cute-input:focus {
    border-color: #ff85b3;
  }

  .cute-input::placeholder {
    color: #ffaacf;
    font-weight: 400;
  }

  .btn-copy {
    background: linear-gradient(135deg, #ff85b3, #e85d98);
    border: none;
    border-radius: 12px;
    padding: 10px 16px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    transition: transform 0.15s, opacity 0.15s;
  }

  .btn-copy:hover { opacity: 0.9; transform: scale(1.03); }
  .btn-copy:active { transform: scale(0.97); }

  .divider {
    border: none;
    border-top: 1.5px dashed #ffcce0;
    margin: 12px 0;
  }

  .edit-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .cute-textarea {
    flex: 1;
    border: 2px solid #ffcce0;
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #7a0038;
    background: #fff8fb;
    outline: none;
    resize: vertical;
    min-height: 68px;
    transition: border-color 0.2s;
  }

  .cute-textarea:focus { border-color: #ff85b3; }
  .cute-textarea::placeholder { color: #ffaacf; font-weight: 400; }

  .btn-save {
    background: linear-gradient(135deg, #ffb3d1, #ff85b3);
    border: none;
    border-radius: 12px;
    padding: 10px 14px;
    color: #7a0038;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    align-self: flex-end;
    transition: transform 0.15s, opacity 0.15s;
  }

  .btn-save:hover { opacity: 0.9; transform: scale(1.03); }
  .btn-save:active { transform: scale(0.97); }

  .toast {
    position: absolute;
    top: 10px; right: 14px;
    background: #ff6fa3;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .footer-strip {
    text-align: center;
    padding: 10px 0 14px;
    font-size: 12px;
    font-weight: 700;
    color: #e06a9a;
    letter-spacing: 0.3px;
  }
</style>

<div class="cute-preview">
  <span class="deco" style="top:60px;left:14px">🍭</span>
  <span class="deco" style="top:55px;right:12px">🍬</span>
  <span class="deco" style="top:110px;left:6px;font-size:16px">🌸</span>
  <span class="deco" style="top:108px;right:8px;font-size:16px">🌸</span>
  <span class="deco" style="bottom:32px;left:14px;font-size:18px">🍩</span>
  <span class="deco" style="bottom:28px;right:14px;font-size:18px">🧁</span>

  <div class="cute-header">
    <div class="bear-icon">🐻</div>
    <div>
      <div class="site-title">Beary Sweet ♡</div>
      <div class="site-sub">your cute clipboard helper</div>
    </div>
  </div>

  <div class="candy-strip">
    <div class="candy-pill">🍭 Copy</div>
    <div class="candy-pill">🍬 Paste</div>
    <div class="candy-pill">🧁 Edit</div>
    <div class="candy-pill">🌸 Save</div>
  </div>

  <div class="main-area">
    <div class="section-label">🐾 Copy to clipboard</div>

    <div class="clipboard-card" style="position:relative">
      <div class="toast" id="toast">Copied! ♡</div>

      <div class="input-row">
        <input class="cute-input" id="copyInput" type="text" placeholder="พิมพ์ข้อความที่อยากก๊อปปี้..."/>
        <button class="btn-copy" onclick="doCopy()">📋 Copy!</button>
      </div>

      <hr class="divider"/>

      <div style="font-size:12px;font-weight:700;color:#c0337a;margin-bottom:7px;">✏️ แก้ไขข้อความ</div>
      <div class="edit-row">
        <textarea class="cute-textarea" id="editArea" placeholder="แก้ไขข้อความตรงนี้ได้เลย 🌸"></textarea>
        <button class="btn-save" onclick="saveEdit()">💾<br/>Save</button>
      </div>
    </div>
  </div>

  <div class="footer-strip">🍭 made with love &amp; sugar 🍬</div>
</div>

<script>
function doCopy() {
  const val = document.getElementById('copyInput').value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    const t = document.getElementById('toast');
    t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 1800);
  });
}

function saveEdit() {
  const val = document.getElementById('editArea').value;
  if (!val) return;
  document.getElementById('copyInput').value = val;
  const t = document.getElementById('toast');
  t.textContent = 'Saved! 🐾';
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; t.textContent = 'Copied! ♡'; }, 1800);
}
</script>
